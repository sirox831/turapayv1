apply plugin: 'com.android.application'

android {
    compileSdk 33
    defaultConfig {
        applicationId "com.turapayway.app"
        minSdk 23
        targetSdk 33
        versionCode 1
        versionName "1.0.0"
    }
    buildTypes {
        release { minifyEnabled false }
        debug { debuggable true }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}